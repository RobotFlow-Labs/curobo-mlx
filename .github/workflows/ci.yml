name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: macos-14  # M1 Apple Silicon runner
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -q --tb=short

  import-safety:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - name: Install package
        run: uv sync

      - name: Verify import
        run: uv run python -c "import curobo_mlx; print(f'v{curobo_mlx.__version__}')"

  benchmark-smoke:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run FK benchmark (smoke test)
        run: uv run python benchmarks/bench_fk.py
